<style>
  body { background-color: #f9f9f7; font-family: 'Inter', sans-serif; }

  /* Scroll snap for wheel */
  .wheel-track {
    scroll-snap-type: y mandatory;
    overflow-y: scroll;
    scrollbar-width: none;
  }
  .wheel-track::-webkit-scrollbar { display: none; }

  /* Fixed height per item — critical for consistent snap math */
  .wheel-item {
    height: 52px;
    scroll-snap-align: center;
  }

  /* 3D cylinder perspective */
  .wheel-wrap {
    perspective: 220px;
    perspective-origin: center center;
  }

  /* Fade top/bottom of wheel */
  .wheel-wrap::before,
  .wheel-wrap::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 52px;
    z-index: 10;
    pointer-events: none;
  }
  .wheel-wrap::before { top: 0; background: linear-gradient(to bottom, #f9f9f7 0%, transparent 100%); }
  .wheel-wrap::after  { bottom: 0; background: linear-gradient(to top, #f9f9f7 0%, transparent 100%); }

  /* Transitions for programmatic snaps (click, step change) */
  .wheel-item-inner {
    transition: opacity 0.2s ease-in-out, background-color 0.2s ease-in-out, filter 0.2s ease-in-out, transform 0.2s ease-in-out;
  }
  /* Suppress transitions while user is actively scrolling — JS drives the animation */
  .is-scrolling .wheel-item-inner {
    transition: none !important;
  }
</style>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const TODAY = new Date(2026, 2, 28); // 2026-03-28
const ITEM_H = 52; // matches .wheel-item { height: 52px } in CSS — fixed, never re-measured
let stepDays  = 1;   // 1 = Today (per-day) | 7 | 30 | 90
let activeIdx = 0;   // index 0 = today, ascending = older
let anchors   = [];

// ─── Wheel appearance tuning ──────────────────────────────────────────────────
const DEGREES_PER_ITEM = 22;  // rotateX degrees per unit of distance from center
const OPACITY_PER_ITEM = 0.38; // opacity drop per unit distance (center = 1.0)
const BLUR_PER_ITEM    = 0.45; // blur px per unit distance from center

// ─── Anchor generation ───────────────────────────────────────────────────────
function buildAnchors() {
  anchors = [];
  for (let i = 0; i <= 300; i++) {
    const d = new Date(TODAY);
    d.setDate(d.getDate() - i * stepDays);
    anchors.push(d);
  }
}

// ─── Format helpers ──────────────────────────────────────────────────────────
function fmtDateLong(d) {
  const y  = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y} ${mo} ${dd}`;
}

function isToday(d) {
  return d.getFullYear() === TODAY.getFullYear() &&
         d.getMonth()    === TODAY.getMonth()    &&
         d.getDate()     === TODAY.getDate();
}

function diffLabel(d) {
  const msPerDay = 86400000;
  const diff = Math.round((TODAY - d) / msPerDay);
  if (diff === 0) return 'today';

  const sign = diff > 0 ? '-' : '+';
  const absDiff = Math.abs(diff);

  if (absDiff < 90) return `${sign}${absDiff}d`;

  let a = diff > 0 ? d : TODAY;
  let b = diff > 0 ? TODAY : d;
  let totalMonths = (b.getFullYear() - a.getFullYear()) * 12 + (b.getMonth() - a.getMonth());
  const dayRef = new Date(a.getFullYear(), a.getMonth() + totalMonths, a.getDate());
  let days = Math.round((b - dayRef) / msPerDay);
  if (days < 0) { totalMonths--; days += 30; }

  const years  = Math.floor(totalMonths / 12);
  const months = totalMonths % 12;

  let parts = [];
  if (years  > 0) parts.push(`${years}yr`);
  if (months > 0) parts.push(`${months}mo`);
  if (days   > 0) parts.push(`${days}d`);

  return `${sign}~${parts.join(' ')}`;
}

// ─── Compute visual style for a given continuous offset from center ───────────
function itemStyle(offset) {
  const rot     = offset * DEGREES_PER_ITEM;
  const opacity = Math.max(0.08, 1 - Math.abs(offset) * OPACITY_PER_ITEM);
  const blur    = Math.max(0, (Math.abs(offset) - 0.05) * BLUR_PER_ITEM);
  const isCenter = Math.abs(offset) < 0.4;
  return {
    transform:       `rotateX(${rot}deg)`,
    opacity:         opacity,
    filter:          blur > 0 ? `blur(${blur}px) grayscale(1)` : 'none',
    backgroundColor: isCenter ? 'rgba(228,228,231,0.5)' : 'transparent',
    borderRadius:    isCenter ? '0.5rem' : '0',
  };
}

// ─── Build inner HTML for a wheel item (initial render only) ─────────────────
function itemInnerHTML(i) {
  const d       = anchors[i];
  const dateStr = isToday(d) ? 'Today' : fmtDateLong(d);
  const sub     = isToday(d) ? '' : diffLabel(d);
  const s       = itemStyle(i - activeIdx);

  return `
    <div class="wheel-item-inner mx-1 h-full px-3
                flex flex-row items-center justify-center gap-2 cursor-pointer select-none"
         style="transform:${s.transform}; opacity:${s.opacity}; filter:${s.filter};
                background-color:${s.backgroundColor}; border-radius:${s.borderRadius}"
         onclick="snapToIdx(${i})">
      <span class="font-space font-bold tracking-tighter text-on-surface leading-none
                   ${Math.abs(i - activeIdx) < 0.5 ? 'text-base font-extrabold' : 'text-sm'}">${dateStr}</span>
      ${sub ? `<span class="wheel-sublabel text-[9px] font-space font-bold text-zinc-400 tracking-wider uppercase">${sub}</span>` : ''}
    </div>`;
}

// ─── Full rebuild — only called on init and step-size change ─────────────────
function renderWheel() {
  const track = document.getElementById('wheelTrack');
  track.innerHTML = '';

  const PAD_H = ITEM_H * 2;

  const padTop = document.createElement('div');
  padTop.className = 'wheel-pad';
  padTop.style.height = PAD_H + 'px';
  track.appendChild(padTop);

  anchors.forEach((_, i) => {
    const el = document.createElement('div');
    el.className = 'wheel-item';
    el.dataset.idx = i;
    el.innerHTML = itemInnerHTML(i);
    track.appendChild(el);
  });

  const padBot = document.createElement('div');
  padBot.className = 'wheel-pad';
  padBot.style.height = PAD_H + 'px';
  track.appendChild(padBot);

  // Fix wheel container to exactly 5 items tall
  const wrap = document.getElementById('wheelWrap');
  if (wrap) wrap.style.height = (ITEM_H * 5) + 'px';

  // Instant scroll to active on rebuild (init / step change)
  track.scrollTo({ top: activeIdx * ITEM_H, behavior: 'instant' });
  updateFilterTag();
}

// ─── Apply itemStyle to a live DOM inner element ─────────────────────────────
function applyStyle(inner, offset) {
  const s = itemStyle(offset);
  inner.style.transform       = s.transform;
  inner.style.opacity         = s.opacity;
  inner.style.filter          = s.filter;
  inner.style.backgroundColor = s.backgroundColor;
  inner.style.borderRadius    = s.borderRadius;
  // Sub-label: zinc-600 (#52525b) when active, revert to zinc-400 class otherwise
  const sub = inner.querySelector('.wheel-sublabel');
  if (sub) sub.style.color = Math.abs(offset) < 0.4 ? '#52525b' : '';
}

// ─── Settled state — called once after scroll stops ──────────────────────────
function updateWheelStyles() {
  document.querySelectorAll('.wheel-item').forEach(el => {
    const inner = el.querySelector('.wheel-item-inner');
    if (!inner) return;
    applyStyle(inner, parseInt(el.dataset.idx) - activeIdx);
  });
}

// ─── Continuous per-frame update — driven by fractional scroll position ───────
let rafId = null;
function updateContinuous() {
  rafId = null;
  const track = document.getElementById('wheelTrack');
  if (!track) return;
  const frac = track.scrollTop / ITEM_H; // fractional index (e.g. 2.7)
  document.querySelectorAll('.wheel-item').forEach(el => {
    const i = parseInt(el.dataset.idx);
    if (Math.abs(i - frac) > 3) return; // skip items far off-screen
    const inner = el.querySelector('.wheel-item-inner');
    if (!inner) return;
    applyStyle(inner, i - frac);
  });
}

// ─── Snap to index (click) — smooth scroll + CSS-transitioned style update ───
function snapToIdx(idx) {
  activeIdx = Math.max(0, Math.min(idx, anchors.length - 1));
  updateWheelStyles(); // sets final styles; CSS transition animates from current state
  updateFilterTag();
  document.getElementById('wheelTrack').scrollTo({ top: activeIdx * ITEM_H, behavior: 'smooth' });
}

// ─── Scroll handler — RAF for continuous visual, debounce for settle ──────────
let scrollTimer;
function onWheelScroll() {
  // Mark as scrolling to suppress CSS transitions (JS drives the animation)
  document.getElementById('wheelWrap').classList.add('is-scrolling');

  // Continuous RAF update — one DOM pass per animation frame
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(updateContinuous);

  // Debounced settle: snap state + re-enable transitions
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    document.getElementById('wheelWrap').classList.remove('is-scrolling');
    const track   = document.getElementById('wheelTrack');
    const idx     = Math.round(track.scrollTop / ITEM_H);
    activeIdx     = Math.max(0, Math.min(idx, anchors.length - 1));
    updateWheelStyles();
    updateFilterTag();
  }, 80);
}

// ─── Filter tag ──────────────────────────────────────────────────────────────
function updateFilterTag() {
  const lbl = document.getElementById('filterLabel');
  const end = anchors[activeIdx];

  if (stepDays === 1) {
    lbl.textContent = isToday(end) ? 'Today' : fmtDateLong(end);
  } else {
    const start = new Date(end);
    start.setDate(start.getDate() - stepDays);
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const s  = `${mo[start.getMonth()]} ${start.getDate()}`;
    const e  = isToday(end) ? 'Today' : `${mo[end.getMonth()]} ${end.getDate()}`;
    lbl.textContent = `${e } \u2009↓\u2009 ${ s}`;
  }
}

// ─── Step-size button active styles ──────────────────────────────────────────
function updateTfButtons() {
  document.querySelectorAll('.tf-btn').forEach(btn => {
    const isActive = parseInt(btn.dataset.tf) === stepDays;
    btn.classList.toggle('bg-white',      isActive);
    btn.classList.toggle('shadow-sm',     isActive);
    btn.classList.toggle('text-zinc-900', isActive);
    btn.classList.toggle('text-zinc-400', !isActive);
  });
}

// ─── Animated scroll — delegates entirely to the browser ─────────────────────
// scrollTo({ behavior: 'smooth' }) fires real scroll events, so onWheelScroll
// takes over: same RAF → updateContinuous → 80ms debounce → settle path as
// manual user scrolling. No custom animation loop needed.
function scrollToAnimated(targetTop) {
  const track = document.getElementById('wheelTrack');
  if (Math.abs(track.scrollTop - targetTop) < 1) return;
  track.scrollTo({ top: targetTop, behavior: 'smooth' });
}

// ─── Step-size change ─────────────────────────────────────────────────────────
function handleTf(days) {
  if (days === 1) {
    // Today button: always snap to today
    if (stepDays === 1 && activeIdx === 0) return; // already there
    if (stepDays !== 1) {
      // Mode switch: rebuild in 1D at the current date's equivalent position, then spring to today
      const currentDate = anchors[activeIdx];
      stepDays = 1;
      updateTfButtons();
      buildAnchors();
      const daysBack = Math.round((TODAY - currentDate) / 86400000);
      activeIdx = Math.max(0, Math.min(daysBack, anchors.length - 1));
      renderWheel(); // instant scroll to current-date position in new 1D DOM
      scrollToAnimated(0); // spring from there to today
    } else {
      // Already in 1D: spring back to today
      activeIdx = 0;
      updateTfButtons();
      scrollToAnimated(0);
    }
    return;
  }

  if (stepDays === days) return;

  // Preserve the currently-active date across step-size changes.
  // Find the closest anchor in the new step size to the current date.
  const currentDate = anchors[activeIdx];
  stepDays = days;
  updateTfButtons();
  buildAnchors();
  const msPerDay = 86400000;
  const daysBack = Math.round((TODAY - currentDate) / msPerDay);
  activeIdx = Math.max(0, Math.min(Math.round(daysBack / days), anchors.length - 1));
  renderWheel();
}

// ─── Clear (filter tag ✕) ────────────────────────────────────────────────────
function handleClear() {
  if (stepDays === 1 && activeIdx === 0) return;
  if (stepDays !== 1) {
    const currentDate = anchors[activeIdx];
    stepDays = 1;
    updateTfButtons();
    buildAnchors();
    const daysBack = Math.round((TODAY - currentDate) / 86400000);
    activeIdx = Math.max(0, Math.min(daysBack, anchors.length - 1));
    renderWheel();
    scrollToAnimated(0);
  } else {
    activeIdx = 0;
    updateTfButtons();
    scrollToAnimated(0);
  }
}

// ─── Feed state ───────────────────────────────────────────────────────────────
let feedVisible = 15;
const FEED_PAGE = 10;
let feedLoading = false;
let dotsInterval = null;

function renderFeed() {
  const feed = document.getElementById('articleFeed');
  const slice = ALL_ARTICLES.slice(0, feedVisible);
  feed.innerHTML = slice.map(a => `
    <div class="bg-white border border-zinc-100 rounded-xl p-4 cursor-pointer hover:border-zinc-300 transition-colors">
      <p class="text-[10px] font-bold tracking-widest uppercase text-zinc-400 font-space mb-2">${a.source}</p>
      <p class="font-headline text-base font-semibold text-zinc-900 leading-snug">${a.title}</p>
    </div>`).join('');
}

function setSentinel(state) {
  const el = document.getElementById('loadSentinel');
  if (state === 'idle') {
    el.innerHTML = '<span class="text-[10px] font-space text-zinc-400 tracking-widest select-none">──────── scroll down to load more ────────</span>';
  } else if (state === 'loading') {
    el.innerHTML = '<span id="loadDots" class="text-[10px] font-space text-zinc-400 tracking-widest select-none">loading ·</span>';
    let n = 1;
    dotsInterval = setInterval(() => {
      n = n % 3 + 1;
      const d = document.getElementById('loadDots');
      if (d) d.textContent = 'loading ' + '·'.repeat(n);
    }, 380);
  } else if (state === 'done') {
    el.innerHTML = '<span class="text-[10px] font-space text-zinc-300 tracking-widest select-none">──────── all caught up ────────</span>';
  }
}

function loadMoreArticles() {
  if (feedLoading) return;
  if (feedVisible >= ALL_ARTICLES.length) { setSentinel('done'); return; }
  feedLoading = true;
  setSentinel('loading');
  setTimeout(() => {
    clearInterval(dotsInterval);
    feedVisible = Math.min(feedVisible + FEED_PAGE, ALL_ARTICLES.length);
    renderFeed();
    feedLoading = false;
    if (feedVisible >= ALL_ARTICLES.length) {
      setSentinel('done');
    } else {
      setSentinel('idle');
    }
  }, 900);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
buildAnchors();

window.addEventListener('load', () => {
  updateTfButtons();
  renderWheel();
  document.getElementById('wheelTrack').addEventListener('scroll', onWheelScroll);

  // Render initial 15 articles
  renderFeed();
  setSentinel('idle');

  // IntersectionObserver — trigger load when sentinel enters viewport
  const sentinel = document.getElementById('loadSentinel');
  new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && !feedLoading) loadMoreArticles();
  }, { threshold: 0.1 }).observe(sentinel);
});
</script>
